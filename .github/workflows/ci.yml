name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-wit:
    name: Validate WIT Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.8.1
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Validate Preview3 WIT
        run: bazel build //:mcp

      - name: Validate Preview2 WIT
        run: bazel build //:mcp_preview2

  check-formatting:
    name: Check WIT Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wasm-tools
        run: |
          curl -LO https://github.com/bytecodealliance/wasm-tools/releases/download/v1.219.1/wasm-tools-1.219.1-x86_64-linux.tar.gz
          tar xzf wasm-tools-1.219.1-x86_64-linux.tar.gz
          sudo mv wasm-tools-1.219.1-x86_64-linux/wasm-tools /usr/local/bin/

      - name: Check WIT files are valid
        run: |
          for witfile in wit/*.wit wit/preview2/*.wit; do
            echo "Checking $witfile"
            wasm-tools component wit $witfile
          done
